services:
  web:
    image: blossomlabs/blobscan-web:${BLOBSCAN_WEB_TAG}
    restart: always
    ports:
      - ${EXTERNAL_WEB_PORT}:3000
    env_file:
      - ".env"

  api:
    # image: blossomlabs/blobscan-api:${BLOBSCAN_API_TAG}
    build:
      context: .
      args:
        DATABASE_URL: ${DATABASE_URL}
        DIRECT_URL: ${DIRECT_URL}
    restart: always
    ports:
      - ${EXTERNAL_API_PORT}:3001
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/healthcheck', res => process.exit(res.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5s
    volumes:
      - /tmp/blobscan-blobs:/tmp/blobscan-blobs
    env_file:
      - ".env"

  indexer:
    image: blossomlabs/blobscan-indexer:master
    restart: always
    env_file:
      - ".env"
    depends_on:
      api:
        condition: service_healthy

  docs:
    image: blossomlabs/blobscan-docs:latest
    restart: always
    ports:
      - ${EXTERNAL_DOCS_PORT:-3002}:3002
